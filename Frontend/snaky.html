<!DOCTYPE html>
<head>
    <title>Snake Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="startScreen" class="overlay">
      <div class="content">
          <h2>Welcome to Snake Game!</h2>
          <p><strong>Rules:</strong> Eat food to grow. Avoid hitting the walls or yourself!</p>
          <input type="text" id="username" placeholder="Enter your username" style="text-align: center;">
          <button id="confirmbtn">Enter Game</button>
      </div>
  </div>
  <canvas id="canvas" height="600" width="600" style="border:1px solid black;"></canvas>
  <script src="variables.js"></script>
  <script src="buttons.js"></script>
  <script src="snake.js"></script>
  <script src="drawing.js"></script>
  <script src="screen.js"></script>
  <script src="controls.js"></script>
  <script src="main.js"></script>
</body>
</html>
