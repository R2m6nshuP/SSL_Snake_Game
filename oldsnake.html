<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Snake Game</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <div class="modal fade" id="startModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Welcome to Snake!</h5>
        </div>
        <div class="modal-body">
          <p><strong>Rules:</strong> Use Arrow Keys or WASD to move. Don't hit the walls or yourself!</p>
          <ul>
            <li>🍎 Apple: +1 Score</li>
            <li>🥧 Pumpkin Pie: +3 Score</li>
            <li>🏆 Golden Apple: 10s Immunity</li>
          </ul>
          <div class="mb-3 mt-4">
            <label for="playerName" class="form-label">Enter your Username:</label>
            <input type="text" class="form-control" id="playerName" placeholder="e.g., Herobrine" required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-primary" id="startBtn">PLAY GAME</button>
        </div>
      </div>
    </div>
  </div>

  <canvas id="canvas" style="border:1px solid black;"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  
  <script src="snake.js"></script>
  <script src="drawing.js"></script>
  <script src="screen.js"></script>
  <script src="controls.js"></script>
  <script src="main.js"></script>
</body>
</html>
